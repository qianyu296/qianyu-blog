services:
  mysql:
    image: mysql:8.4
    container_name: qianyu-blog-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_DATABASE: qianyu_blog
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root-password}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./qianyu_blog_backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./qianyu_blog_backend
    container_name: qianyu-blog-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/qianyu_blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root-password}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      MUSIC_STORAGE_DIR: /app/uploads/music
      MEDIA_STORAGE_DIR: /app/uploads/media
    volumes:
      - backend_music:/app/uploads/music
      - backend_media:/app/uploads/media

  frontend:
    build:
      context: ./qianyu_blog_frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: qianyu-blog-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  mysql_data:
  backend_music:
  backend_media:
