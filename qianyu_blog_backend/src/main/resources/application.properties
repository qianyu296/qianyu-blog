spring.application.name=qianyu_blog

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/qianyu_blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=${SERVER_PORT:8080}

qianyu.jwt.secret=${JWT_SECRET:qianyu-blog-demo-secret-key-change-me-please-2026}
qianyu.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
qianyu.admin.username=${ADMIN_USERNAME:admin}
qianyu.admin.password=${ADMIN_PASSWORD:admin123}
qianyu.storage.music-dir=${MUSIC_STORAGE_DIR:uploads/music}
qianyu.storage.media-dir=${MEDIA_STORAGE_DIR:uploads/media}
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:60MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:60MB}
server.tomcat.max-swallow-size=${TOMCAT_MAX_SWALLOW_SIZE:60MB}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
