spring.application.name=qianyu_blog

spring.datasource.url=${QIANYU_BLOG_DB_URL}
spring.datasource.username=${QIANYU_BLOG_DB_USERNAME}
spring.datasource.password=${QIANYU_BLOG_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=${QIANYU_BLOG_SERVER_PORT:8080}

qianyu.jwt.secret=${QIANYU_BLOG_JWT_SECRET}
qianyu.jwt.expiration-minutes=${QIANYU_BLOG_JWT_EXPIRATION_MINUTES:120}
qianyu.admin.username=${QIANYU_BLOG_ADMIN_USERNAME}
qianyu.admin.password=${QIANYU_BLOG_ADMIN_PASSWORD}
qianyu.storage.music-dir=${QIANYU_BLOG_MUSIC_STORAGE_DIR:uploads/music}
qianyu.storage.media-dir=${QIANYU_BLOG_MEDIA_STORAGE_DIR:uploads/media}
spring.servlet.multipart.max-file-size=${QIANYU_BLOG_MULTIPART_MAX_FILE_SIZE:60MB}
spring.servlet.multipart.max-request-size=${QIANYU_BLOG_MULTIPART_MAX_REQUEST_SIZE:60MB}
server.tomcat.max-swallow-size=${QIANYU_BLOG_TOMCAT_MAX_SWALLOW_SIZE:60MB}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
