services:
  mysql:
    image: mysql:8.4
    container_name: qianyu-blog-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_DATABASE: qianyu_blog
      MYSQL_ROOT_PASSWORD: ${QIANYU_BLOG_MYSQL_ROOT_PASSWORD:-change-me-qianyu-blog-mysql-root-password}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./qianyu_blog_backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./qianyu_blog_backend
    container_name: qianyu-blog-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      QIANYU_BLOG_SERVER_PORT: 8080
      QIANYU_BLOG_DB_URL: jdbc:mysql://mysql:3306/qianyu_blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      QIANYU_BLOG_DB_USERNAME: root
      QIANYU_BLOG_DB_PASSWORD: ${QIANYU_BLOG_DB_PASSWORD:-change-me-qianyu-blog-db-password}
      QIANYU_BLOG_JWT_SECRET: ${QIANYU_BLOG_JWT_SECRET:-change-me-qianyu-blog-jwt-secret-at-least-32-chars}
      QIANYU_BLOG_ADMIN_USERNAME: ${QIANYU_BLOG_ADMIN_USERNAME:-change-me-admin-username}
      QIANYU_BLOG_ADMIN_PASSWORD: ${QIANYU_BLOG_ADMIN_PASSWORD:-change-me-admin-password}
      QIANYU_BLOG_MUSIC_STORAGE_DIR: /app/uploads/music
      QIANYU_BLOG_MEDIA_STORAGE_DIR: /app/uploads/media
    volumes:
      - backend_music:/app/uploads/music
      - backend_media:/app/uploads/media

  frontend:
    build:
      context: ./qianyu_blog_frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: qianyu-blog-frontend
    restart: unless-stopped
    depends_on:
      - backend
    command:
      - /bin/sh
      - -c
      - until wget -q --spider http://backend:8080/api/public/categories; do sleep 1; done; exec nginx -g 'daemon off;'
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  mysql_data:
  backend_music:
  backend_media:
